version: "2"
sql:
  - engine: "sqlite"
    queries: "infrastructure/sqlite/queries"
    schema: "migrations"
    gen:
      go:
        package: "sqlcdb"
        out: "infrastructure/sqlite/sqlcdb"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
