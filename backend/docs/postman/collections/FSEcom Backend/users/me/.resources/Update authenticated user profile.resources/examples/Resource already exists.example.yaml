$kind: http-example
request:
  url: "{{baseUrl}}/users/me"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: access_token
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "name": "Roger Updated",
        "email": "roger@example.com"
      }
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": "conflict",
        "message": "Email already in use"
      }
order: 4000
