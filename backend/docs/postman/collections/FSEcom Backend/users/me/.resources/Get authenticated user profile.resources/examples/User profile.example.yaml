$kind: http-example
request:
  url: "{{baseUrl}}/users/me"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: access_token
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: text
    content: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "cfc1383e-668d-43d5-8e63-9e15a3e33838",
        "name": "John Doe",
        "email": "john@example.com"
      }
order: 1000
