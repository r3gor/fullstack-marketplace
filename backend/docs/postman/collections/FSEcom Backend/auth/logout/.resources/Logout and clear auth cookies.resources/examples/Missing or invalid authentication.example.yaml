$kind: http-example
request:
  url: "{{baseUrl}}/auth/logout"
  method: POST
  headers:
    - key: Accept
      value: application/json
    - key: access_token
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: text
    content: ""
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": "unauthorized",
        "message": "Authentication required"
      }
order: 2000
