$kind: http-example
request:
  url: "{{baseUrl}}/auth/register"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: access_token
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "name": "John Doe",
        "email": "john@example.com",
        "password": "supersecret123"
      }
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": "conflict",
        "message": "Email already in use"
      }
order: 3000
