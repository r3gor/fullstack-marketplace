$kind: http-request
description: |
  On success, sets two httpOnly cookies:
  - `access_token`: JWT valid for 15 minutes
  - `refresh_token`: opaque token valid for 7 days (scoped to `/api/v1/auth`)
url: "{{baseUrl}}/auth/login"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "email": "john@example.com",
      "password": "supersecret123"
    }
examples: ./.resources/Login with email and password.resources/examples
order: 1000
