$kind: http-example
request:
  url: "{{baseUrl}}/favorites/:productId"
  method: POST
  headers:
    - key: Accept
      value: application/json
    - key: access_token
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    productId: "8462"
  body:
    type: text
    content: ""
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": "conflict",
        "message": "Email already in use"
      }
order: 3000
