$kind: http-example
request:
  url: "{{baseUrl}}/products/:productId/reviews"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: access_token
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    productId: "8462"
  body:
    type: json
    content: |-
      {
        "rating": 4,
        "comment": "Great product, exactly as described. Fast shipping."
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": "unauthorized",
        "message": "Authentication required"
      }
order: 3000
