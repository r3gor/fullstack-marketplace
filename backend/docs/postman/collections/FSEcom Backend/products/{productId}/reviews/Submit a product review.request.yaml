$kind: http-request
description: |
  Validates before creating:
  1. User is authenticated
  2. User has a paid/shipped/delivered order containing this product
  3. User has not already reviewed this product

  On success, creates a review in Strapi with `status: pending`.
  A Strapi admin can then change it to `approved` or `rejected`.
  The frontend only receives `approved` reviews from Strapi.
url: "{{baseUrl}}/products/:productId/reviews"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  productId: "8462"
body:
  type: json
  content: |-
    {
      "rating": 4,
      "comment": "Great product, exactly as described. Fast shipping."
    }
examples: ./.resources/Submit a product review.resources/examples
order: 1000
