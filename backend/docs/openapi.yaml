openapi: 3.1.0

info:
  title: Fullstack E-commerce API
  description: |
    REST API for the Fullstack E-commerce learning project.

    ## Authentication
    Uses JWT stored in **httpOnly cookies**. After login, the access token is set
    automatically — no need to manually set Authorization headers in the browser.
    For Postman/Insomnia, enable "Send cookies" or copy the token manually.

    ## Error format
    All errors follow a consistent shape:
    ```json
    { "error": "error_code", "message": "Human-readable description" }
    ```
  version: 0.1.0
  contact:
    name: Roger Ramos

servers:
  - url: http://localhost:8080/api/v1
    description: Local development

tags:
  - name: Health
    description: Service health check
  - name: Auth
    description: Register, login, logout and token refresh
  - name: Users
    description: Authenticated user profile
  - name: Favorites
    description: User product favorites
  - name: Orders
    description: Orders and checkout
  - name: Reviews
    description: Product reviews (validated by backend, stored in Strapi)

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      description: Returns the service status and verifies database connectivity.
      tags:
        - Health
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                service: fullstack-ecommerce-api
        "503":
          description: Service unavailable (database unreachable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: service_unavailable
                message: database unreachable

  /auth/register:
    post:
      operationId: authRegister
      summary: Register a new user
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/login:
    post:
      operationId: authLogin
      summary: Login with email and password
      description: |
        On success, sets two httpOnly cookies:
        - `access_token`: JWT valid for 15 minutes
        - `refresh_token`: opaque token valid for 7 days (scoped to `/api/v1/auth`)
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful — auth cookies set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/logout:
    post:
      operationId: authLogout
      summary: Logout and clear auth cookies
      description: Invalidates the refresh token in the database and clears both auth cookies.
      tags:
        - Auth
      responses:
        "204":
          description: Logged out successfully
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/refresh:
    post:
      operationId: authRefresh
      summary: Refresh access token
      description: |
        Rotates the refresh token (old one is invalidated) and issues a new access token.
        Requires the `refresh_token` httpOnly cookie to be present.
      tags:
        - Auth
      security: []
      responses:
        "200":
          description: Token refreshed — new auth cookies set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /users/me:
    get:
      operationId: getUsersMe
      summary: Get authenticated user profile
      tags:
        - Users
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    patch:
      operationId: updateUsersMe
      summary: Update authenticated user profile
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /favorites:
    get:
      operationId: listFavorites
      summary: List user favorites
      tags:
        - Favorites
      responses:
        "200":
          description: List of favorited product IDs with timestamps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FavoriteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /favorites/{productId}:
    post:
      operationId: addFavorite
      summary: Add product to favorites
      tags:
        - Favorites
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Added to favorites
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

    delete:
      operationId: removeFavorite
      summary: Remove product from favorites
      tags:
        - Favorites
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed from favorites
        "401":
          $ref: "#/components/responses/Unauthorized"

  /orders:
    get:
      operationId: listOrders
      summary: List authenticated user's orders
      tags:
        - Orders
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createOrder
      summary: Create a new order (checkout)
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /orders/{id}:
    get:
      operationId: getOrder
      summary: Get a specific order by ID
      tags:
        - Orders
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /products/{productId}/reviews:
    post:
      operationId: createReview
      summary: Submit a product review
      description: |
        Validates before creating:
        1. User is authenticated
        2. User has a paid/shipped/delivered order containing this product
        3. User has not already reviewed this product

        On success, creates a review in Strapi with `status: pending`.
        A Strapi admin can then change it to `approved` or `rejected`.
        The frontend only receives `approved` reviews from Strapi.
      tags:
        - Reviews
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
      responses:
        "201":
          description: Review submitted and pending moderation
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: review submitted and pending moderation
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          enum: [ok, unhealthy]
        service:
          type: string

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          minLength: 8
          example: supersecret123

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          example: supersecret123

    UserResponse:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          format: uuid
          example: cfc1383e-668d-43d5-8e63-9e15a3e33838
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com

    UpdateUserRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: Roger Updated
        email:
          type: string
          format: email
          example: roger@example.com

    FavoriteResponse:
      type: object
      required:
        - product_id
        - created_at
      properties:
        product_id:
          type: integer
          example: 42
        created_at:
          type: string
          format: date-time
          example: "2026-04-04T19:46:21Z"

    CreateOrderRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OrderItemRequest"

    OrderItemRequest:
      type: object
      required:
        - product_id
        - quantity
        - price_at_purchase
      properties:
        product_id:
          type: integer
          example: 5
        quantity:
          type: integer
          minimum: 1
          example: 2
        price_at_purchase:
          type: number
          format: float
          example: 29.99

    OrderItemResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        product_id:
          type: integer
        quantity:
          type: integer
        price_at_purchase:
          type: number
          format: float

    OrderResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 5010be08-e0a8-4cd4-806f-e8b7f045f026
        total_amount:
          type: number
          format: float
          example: 109.97
        status:
          type: string
          enum: [pending, paid, shipped, delivered, cancelled]
          example: pending
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemResponse"
        created_at:
          type: string
          format: date-time

    CreateReviewRequest:
      type: object
      required:
        - rating
        - comment
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 4
        comment:
          type: string
          minLength: 10
          maxLength: 1000
          example: Great product, exactly as described. Fast shipping.

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Machine-readable error code (snake_case)
          examples:
            - validation_error
            - unauthorized
            - not_found
            - conflict
            - internal_server_error
        message:
          type: string
          description: Human-readable error description

  responses:
    BadRequest:
      description: Invalid request data
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: validation_error
            message: Rating must be between 1 and 5

    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: unauthorized
            message: Authentication required

    Forbidden:
      description: Authenticated but not allowed to access this resource
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: forbidden
            message: Access denied

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: not_found
            message: Resource not found

    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: conflict
            message: Email already in use

    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: internal_server_error
            message: An unexpected error occurred

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: JWT access token set as httpOnly cookie after login

security:
  - cookieAuth: []
